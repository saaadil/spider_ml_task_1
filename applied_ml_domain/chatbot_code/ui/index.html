<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPIDER ML RAG Platform</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Spider ML Assistant</h2>
        
        <div class="chat-box" id="chatBox">
            <div class="message">
                <span class="bot">System:</span> RAG Knowledge online. Ask me anything about the 7 indexed NLP papers.
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" id="queryInput" placeholder="Ask a research question..." onkeydown="if(event.key==='Enter') sendQuery()">
            <button onclick="sendQuery()">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
